<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fiertoi. — proud of you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0e8d8;
      --paper:     #ede3cc;
      --ink:       #3d3526;
      --ink-light: #8a7a60;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Special Elite', monospace;
      color: var(--ink);
      overflow-x: hidden;
      background-color: var(--bg);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url('images/background.png');
      background-repeat: repeat-y;
      background-size: auto 100vh;
      background-position: center top;
    }

    /* ── PAGE ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HERO ── */
    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 0;
    }

    .logo-img {
      width: min(160px, 40vw);
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.18));
      animation: fadeUp 0.8s ease both;
    }

    /* ── PAPER STRIP (features bg) ── */
    .paper-strip {
      width: 100%;
      padding: 8px 0 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .features-img {
      width: min(460px, 92vw);
      animation: fadeUp 0.8s 0.15s ease both;
    }

    /* ── STATS ── */
    .stats-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 40px;
      animation: fadeUp 0.8s 0.25s ease both;
    }

    .stats-img { width: min(440px, 88vw); }

    /* ── WAITING LIST ── */
    .waiting-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 24px 0;
    }

    .waiting-card {
      position: relative;
      width: min(440px, 88vw);
      animation: fadeUp 0.8s 0.35s ease both;
      background-image: url('images/waiting.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      padding: 68px 52px 72px;
    }

    .waiting-card h2 {
      text-align: center;
      font-family: 'Special Elite', monospace;
      font-size: 28px;
      font-weight: normal;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .waiting-card p {
      font-family: 'Special Elite', monospace;
      font-size: 15px;
      color: var(--ink-light);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .email-input {
      width: 100%;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(61,53,38,0.3);
      border-radius: 2px;
      padding: 11px 14px;
      font-family: 'Special Elite', monospace;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .email-input::placeholder { color: var(--ink-light); }
    .email-input:focus {
      border-color: rgba(61,53,38,0.55);
      background: rgba(255,255,255,0.65);
    }

    .submit-btn {
      width: 100%;
      background: #3d3020;
      color: var(--bg);
      border: none;
      border-radius: 2px;
      padding: 13px 24px;
      font-family: 'Special Elite', monospace;
      font-size: 16px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .submit-btn:hover  { background: #574a35; }
    .submit-btn:active { transform: scale(0.98); }

    .success-msg {
      display: none;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--ink);
      text-align: center;
      padding: 12px 0;
      line-height: 1.6;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 52px;
      font-family: 'Special Elite', monospace;
      font-size: 13px;
      color: var(--ink-light);
      text-align: center;
      opacity: 0.7;
      padding-bottom: 16px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      body::before { background-size: 100% auto; }
      .logo-img { width: min(260px, 78vw); }
      .features-img { width: 92vw; }
      .stats-img { width: 88vw; }
      .waiting-card { padding: 36px 28px 40px; }
      .email-input  { font-size: 13px; padding: 8px 10px; }
      .submit-btn   { font-size: 14px; padding: 10px; }
    }
  </style>
</head>
<body>

  <div class="page">

    <section class="hero">
      <img class="logo-img" src="images/logo.png" alt="fiertoi. — fier de toi · proud of you" />
    </section>

    <div class="paper-strip">
      <img class="features-img" src="images/features.png" alt="App features: Capture, Personal, Altruism, Analytics" />
    </div>

    <section class="stats-section">
      <img class="stats-img" src="images/stats.png" alt="Gratitude rewires the brain. Private by design." />
    </section>

    <section class="waiting-section">
      <div class="waiting-card">
        <h2>Join waiting list</h2>
        <p>Don't miss another moment, capture it with fiertoi.</p>
        <form id="waitlistForm" action="https://formspree.io/f/xbdwpdjr" method="POST">
          <input class="email-input" type="email" name="email" placeholder="your-email@fiertoi.com" required autocomplete="email" />
          <button class="submit-btn" type="submit">Keep me updated</button>
          <div class="success-msg" id="successMsg">you're on the list 🤎<br/>see you when fiertoi launches.</div>
        </form>
      </div>
    </section>

    <footer class="footer">
      fiertoi. &nbsp;·&nbsp; fierté + toi — proud of you
    </footer>

  </div>

  <script>
    const form = document.getElementById('waitlistForm');
    const successMsg = document.getElementById('successMsg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('.submit-btn');
      const input = form.querySelector('.email-input');
      btn.textContent = 'sending...';
      btn.style.opacity = '0.6';
      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          btn.style.display = 'none';
          input.style.display = 'none';
          successMsg.style.display = 'block';
        } else {
          btn.textContent = 'try again';
          btn.style.opacity = '1';
        }
      } catch {
        btn.textContent = 'try again';
        btn.style.opacity = '1';
      }
    });
  </script>
</body>
</html>
